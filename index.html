<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italiana Delizioso - Completos, Pizzas y Sushi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff8f0 0%, #ffe4cc 100%);
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #c8102e 0%, #f4a460 100%);
            padding: 20px;
            color: white;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 2.5em;
            font-style: italic;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        nav {
            background: #2c3e50;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        nav button {
            background: #c8102e;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        nav button:hover {
            background: #f4a460;
            transform: scale(1.05);
        }
        main {
            display: grid;
            grid-template-columns: 2fr 1fr;
            max-width: 1200px;
            margin: 20px auto;
            gap: 20px;
            padding: 20px;
        }
        .section {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-left: 5px solid #c8102e;
        }
        .section h2 {
            color: #c8102e;
            margin-bottom: 15px;
            font-style: italic;
        }
        .product-group {
            margin-bottom: 20px;
            border: 2px solid #ffe4cc;
            padding: 15px;
            border-radius: 8px;
        }
        .product-group h3 {
            color: #f4a460;
            margin-bottom: 10px;
        }
        .ingredients {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }
        .ingredient-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .ingredient-item input[type="checkbox"] {
            cursor: pointer;
            width: 18px;
            height: 18px;
        }
        .quantity-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .quantity-group input {
            width: 60px;
            padding: 8px;
            border: 2px solid #ffe4cc;
            border-radius: 5px;
        }
        .quantity-group button {
            background: #c8102e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .quantity-group button:hover {
            background: #f4a460;
        }
        .cart {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            height: fit-content;
            position: sticky;
            top: 20px;
        }
        .cart h2 {
            color: #c8102e;
            margin-bottom: 15px;
            font-style: italic;
        }
        .cart-item {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 5px;
            border-left: 3px solid #f4a460;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .cart-total {
            font-size: 1.3em;
            font-weight: bold;
            color: #c8102e;
            margin: 15px 0;
            padding-top: 15px;
            border-top: 2px solid #ffe4cc;
        }
        .discount-section {
            background: #fff8f0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .discount-section input {
            width: 100%;
            padding: 8px;
            border: 2px solid #ffe4cc;
            border-radius: 5px;
            margin-bottom: 10px;
        }
        .beverage-select, .addon-select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ffe4cc;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
        }
        .checkout-btn {
            width: 100%;
            background: linear-gradient(135deg, #c8102e 0%, #f4a460 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(200, 16, 46, 0.3);
        }
        @media (max-width: 768px) {
            main {
                grid-template-columns: 1fr;
            }
            .cart {
                position: static;
            }
            header h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🍽️ Italiana Delizioso 🍽️</h1>
        <p>Completos, Pizzas y Sushi Auténticos</p>
    </header>

    <nav>
        <button onclick="scrollToSection('completos')">Completos</button>
        <button onclick="scrollToSection('pizzas')">Pizzas</button>
        <button onclick="scrollToSection('sushi')">Sushi</button>
        <button onclick="scrollToSection('bebidas')">Bebidas</button>
    </nav>

    <main>
        <div>
            <!-- COMPLETOS -->
            <div class="section" id="completos">
                <h2>🌭 Completos </h2>
                <div class="product-group">
                    <h3>Selecciona ingredientes</h3>
                    <div class="ingredients">
                        <label class="ingredient-item"><input type="checkbox"> Tomate</label>
                        <label class="ingredient-item"><input type="checkbox"> Chucrut</label>
                        <label class="ingredient-item"><input type="checkbox"> Papitas</label>
                        <label class="ingredient-item"><input type="checkbox"> Salsa americana</label>
                        <label class="ingredient-item"><input type="checkbox"> Mayonesa</label>
                        <label class="ingredient-item"><input type="checkbox"> Palta</label>
                    </div>
                    <div class="quantity-group">
                        <label>Cantidad:</label>
                        <input type="number" value="1" min="1">
                        <button onclick="addToCart('Completos')">Agregar</button>
                    </div>
                </div>
            </div>

            <!-- PIZZAS -->
            <div class="section" id="pizzas">
                <h2>🍕 Pizzas Napolitanas</h2>
                <div class="product-group">
                    <h3>Selecciona ingredientes</h3>
                    <div class="ingredients">
                        <label class="ingredient-item"><input type="checkbox"> Mozzarella</label>
                        <label class="ingredient-item"><input type="checkbox"> Pepperoni</label>
                        <label class="ingredient-item"><input type="checkbox"> Champiñones</label>
                        <label class="ingredient-item"><input type="checkbox"> Aceitunas</label>
                        <label class="ingredient-item"><input type="checkbox"> Cebolla</label>
                        <label class="ingredient-item"><input type="checkbox"> Jamón</label>
                        <label class="ingredient-item"><input type="checkbox"> Pollo</label>
                    </div>
                    <div class="quantity-group">
                        <label>Cantidad:</label>
                        <input type="number" value="1" min="1">
                        <button onclick="addToCart('Pizzas')">Agregar</button>
                    </div>
                </div>
            </div>

            <!-- SUSHI -->
            <div class="section" id="sushi">
                <h2>🍣 Sushi Fresco</h2>
                <div class="product-group">
                    <h3>Selecciona ingredientes</h3>
                    <div class="ingredients">
                        <label class="ingredient-item"><input type="checkbox"> Salmón</label>
                        <label class="ingredient-item"><input type="checkbox"> Atún</label>
                        <label class="ingredient-item"><input type="checkbox"> Camarones</label>
                        <label class="ingredient-item"><input type="checkbox"> Aguacate</label>
                        <label class="ingredient-item"><input type="checkbox"> Pepino</label>
                        <label class="ingredient-item"><input type="checkbox"> Queso Philadelphia</label>
                        <label class="ingredient-item"><input type="checkbox"> Pollo</label>
                    </div>
                    <div class="quantity-group">
                        <label>Cantidad:</label>
                        <input type="number" value="1" min="1">
                        <button onclick="addToCart('Sushi')">Agregar</button>
                    </div>
                </div>
            </div>

            <!-- BEBIDAS -->
            <div class="section" id="bebidas">
                <h2>🥤 Bebidas</h2>
                <select class="beverage-select" id="beverageSelect">
                    <option value="">Selecciona una bebida</option>
                    <option value="Coca Cola - $2.000">Coca Cola - $2.000</option>
                    <option value="Sprite - $2.000">Sprite - $2.000</option>
                    <option value="Fanta - $2.000">Fanta - $2.000</option>
                    <option value="Jugo Natural - $3.000">Jugo Natural - $3.000</option>
                    <option value="Agua - $1.000">Agua - $1.000</option>
                </select>
                <div class="quantity-group">
                    <label>Cantidad:</label>
                    <input type="number" id="beverageQty" value="1" min="1">
                    <button onclick="addBeverage()">Agregar</button>
                </div>
            </div>

            <!-- ADICIONES -->
            <div class="section">
                <h2>🍟 Adiciones Extras</h2>
                <select class="addon-select" id="addonSelect">
                    <option value="">Selecciona una adición</option>
                    <option value="Papas Fritas - $3.000">Papas Fritas - $3.000</option>
                    <option value="Empanadas de Coctel - $4.000">Empanadas de Coctel - $4.000</option>
                    <option value="Palitos de Ajo - $2.500">Palitos de Ajo - $2.500</option>
                </select>
                <div class="quantity-group">
                    <label>Cantidad:</label>
                    <input type="number" id="addonQty" value="1" min="1">
                    <button onclick="addAddon()">Agregar</button>
                </div>
            </div>
        </div>

        <!-- CARRITO -->
        <aside class="cart">
            <h2>🛒 Tu Carrito</h2>
            <div id="cartItems"></div>
            
            <div class="discount-section">
                <label><strong>Código de Descuento:</strong></label>
                <input type="text" id="discountCode" placeholder="Ingresa tu código">
                <button class="checkout-btn" onclick="applyDiscount()" style="margin-top: 10px;">Aplicar Descuento</button>
            </div>

            <div class="cart-total">
                Subtotal: $<span id="subtotal">0</span>
            </div>
            <div class="cart-total">
                Descuento: -$<span id="discount">0</span>
            </div>
            <div class="cart-total">
                Total: $<span id="total">0</span>
            </div>

            <button class="checkout-btn" onclick="checkout()">Finalizar Compra</button>
            <button class="checkout-btn" style="background: #999; margin-top: 10px;" onclick="clearCart()">Vaciar Carrito</button>
        </aside>
    </main>

    <script>
        let cart = [];
        let discountAmount = 0;

        const prices = {
            completos: { base: 3000, ingredient: 500 },
            pizzas: { base: 5000, ingredient: 800 },
            sushi: { base: 4000, ingredient: 600 }
        };

        function addToCart(product) {
            const section = document.getElementById(product.toLowerCase());
            const checkboxes = section.querySelectorAll('input[type="checkbox"]:checked');
            const ingredients = Array.from(checkboxes).map(cb => cb.parentElement.textContent.trim());
            const qtyInput = section.querySelector('input[type="number"]');
            const qty = parseInt(qtyInput.value);
            
            if (ingredients.length === 0) {
                alert('Selecciona al menos un ingrediente');
                return;
            }
            
            const priceData = prices[product.toLowerCase()];
            const ingredientCost = ingredients.length * priceData.ingredient;
            const totalPrice = (priceData.base + ingredientCost) * qty;
            
            cart.push({ 
                name: product, 
                ingredients: ingredients, 
                qty: qty, 
                price: totalPrice 
            });
            
            alert(product + ' agregado al carrito');
            updateCart();
        }
            alert(product + ' agregado al carrito');
            updateCart();
        }

        function addBeverage() {
            const beverage = document.getElementById('beverageSelect').value;
            const qty = parseInt(document.getElementById('beverageQty').value);
            if (beverage) {
                const [name, priceStr] = beverage.split(' - $');
                const price = parseInt(priceStr.replace('.', ''));
                cart.push({ name: name, qty: qty, price: price * qty });
            }
            updateCart();
        }

        function addAddon() {
            const addon = document.getElementById('addonSelect').value;
            const qty = parseInt(document.getElementById('addonQty').value);
            if (addon) {
                const [name, priceStr] = addon.split(' - $');
                const price = parseInt(priceStr.replace('.', ''));
                cart.push({ name: name, qty: qty, price: price * qty });
            }
            updateCart();
        }

        function updateCart() {
            const cartDiv = document.getElementById('cartItems');
            cartDiv.innerHTML = cart.map((item, i) => {
                let displayName = item.name;
                if (item.ingredients) {
                    displayName += ` (${item.ingredients.join(', ')})`;
                }
                return `<div class="cart-item"><span>${displayName} x${item.qty} - $${item.price.toLocaleString()}</span><button onclick="removeFromCart(${i})">✕</button></div>`;
            }).join('');
            updateTotal();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function updateTotal() {
            const subtotal = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('subtotal').textContent = subtotal.toLocaleString();
            document.getElementById('total').textContent = (subtotal - discountAmount).toLocaleString();
        }

        function applyDiscount() {
            const code = document.getElementById('discountCode').value;
            discountAmount = code === 'ITALIA10' ? 5000 : code === 'PIZZA20' ? 10000 : 0;
            document.getElementById('discount').textContent = discountAmount;
            updateTotal();
        }

        function checkout() {
            alert('¡Gracias por tu compra! Tu pedido será entregado pronto. 🍽️');
            clearCart();
        }

        function clearCart() {
            cart = [];
            discountAmount = 0;
            updateCart();
            document.getElementById('discountCode').value = '';
            document.getElementById('discount').textContent = '0';
        }

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
